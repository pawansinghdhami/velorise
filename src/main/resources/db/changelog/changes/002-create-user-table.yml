databaseChangeLog:

  - changeSet:
      id: 001-create-user-table
      author: pawan

      changes:
        - createTable:
            tableName: app_user

            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: first_name
                  type: VARCHAR(50)

              - column:
                  name: last_name
                  type: VARCHAR(50)

              - column:
                  name: email
                  type: VARCHAR(50)
                  constraints:
                    unique: true
                    nullable: false

              - column:
                  name: password
                  type: VARCHAR(255)

              - column:
                  name: phone
                  type: VARCHAR(15)

              - column:
                  name: role
                  type: VARCHAR(10)

              - column:
                  name: status
                  type: VARCHAR(10)

              - column:
                  name: created_dtm
                  type: TIMESTAMP with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_dtm
                  type: TIMESTAMP with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: created_by
                  type: varchar(50)

              - column:
                  name: updated_by
                  type: varchar(50)

        - sql:
            sql: |
              CREATE TRIGGER trg_app_user_updated_dtm
              BEFORE UPDATE ON app_user
              FOR EACH ROW
              EXECUTE FUNCTION update_updated_dtm();