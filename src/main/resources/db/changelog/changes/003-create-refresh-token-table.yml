databaseChangeLog:

  - changeSet:
      id: 004-create-refresh-token-table
      author: pawan

      changes:
        - createTable:
            tableName: refresh_token

            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: token
                  type: VARCHAR(512)
                  constraints:
                    unique: true
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: expiry_date
                  type: TIMESTAMP with time zone
                  constraints:
                    nullable: false

              - column:
                  name: revoked
                  type: BOOLEAN
                  defaultValue: false
                  constraints:
                    nullable: false

              - column:
                  name: created_dtm
                  type: TIMESTAMP with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_dtm
                  type: TIMESTAMP with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: created_by
                  type: varchar(50)

              - column:
                  name: updated_by
                  type: varchar(50)

        - addForeignKeyConstraint:
            baseTableName: refresh_token
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_refresh_token_user
            onDelete: CASCADE

        - sql:
            sql: |
              CREATE TRIGGER trg_refresh_token_updated_dtm
              BEFORE UPDATE ON refresh_token
              FOR EACH ROW
              EXECUTE FUNCTION update_updated_dtm();