services:
  postgres:
    image: postgres:17
    container_name: velorise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: velorise
      POSTGRES_PASSWORD: velorise
      POSTGRES_DB: velorise
      TZ: "Asia/Kolkata"
    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: velorise-redis
    restart: unless-stopped

    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
   postgres-data:
   redis-data: